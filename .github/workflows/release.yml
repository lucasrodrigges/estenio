name: Build & Release (multiplataforma)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Bundle ffmpeg
        run: bash scripts/bundle-ffmpeg.sh linux
      - name: Instalar dependências
        run: pip install -e ".[dev]"
      - name: Compilar
        run: pyinstaller estenio.spec
      - name: Testar
        run: ./dist/estenio --version
      - uses: actions/upload-artifact@v4
        with:
          name: estenio-linux
          path: dist/estenio

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Bundle ffmpeg
        run: bash scripts/bundle-ffmpeg.sh macos
      - name: Instalar dependências
        run: pip install -e ".[dev]"
      - name: Compilar
        run: pyinstaller estenio.spec
      - name: Testar
        run: ./dist/estenio --version
      - uses: actions/upload-artifact@v4
        with:
          name: estenio-macos
          path: dist/estenio

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }
      - name: Bundle ffmpeg
        shell: bash
        run: bash scripts/bundle-ffmpeg.sh windows
      - name: Instalar dependências
        run: pip install -e ".[dev]"
      - name: Compilar
        run: pyinstaller estenio.spec
      - name: Testar
        run: .\dist\estenio.exe --version
      - uses: actions/upload-artifact@v4
        with:
          name: estenio-windows
          path: dist/estenio.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Preparar assets
        run: |
          mkdir -p release
          cp estenio-linux/estenio      release/estenio-linux
          cp estenio-macos/estenio      release/estenio-macos
          cp estenio-windows/estenio.exe release/estenio-windows.exe
      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Estenio ${{ github.ref_name }}
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
